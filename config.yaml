# =========================================
# Medical Report Summariser - Config
# =========================================

project:
  name: "medical-report-summariser"
  version: "1.0.0"
  description: "AI-powered clinical text to patient-friendly summary"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  samples_dir: "data/samples"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_input_length: 1024
  max_target_length: 256

model:
  base_model: "facebook/bart-large-cnn"
  output_dir: "models/checkpoints"
  final_dir: "models/final"

training:
  epochs: 3
  batch_size: 4
  learning_rate: 2e-5
  warmup_steps: 100
  weight_decay: 0.01
  gradient_accumulation_steps: 4
  fp16: true
  logging_steps: 50
  save_steps: 500
  eval_steps: 500

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules: ["q_proj", "v_proj"]

evaluation:
  rouge_types: ["rouge1", "rouge2", "rougeL"]
  batch_size: 8

app:
  host: "0.0.0.0"
  port: 7860
  max_length: 256
  num_beams: 4
  no_repeat_ngram_size: 3